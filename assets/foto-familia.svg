<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 420" preserveAspectRatio="xMidYMid slice">
  <!-- Atardecer en el banco: abuelo y nieta -->
  <defs>
    <linearGradient id="dusk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2E4A3C"/>
      <stop offset=".55" stop-color="#3E5C4B"/>
      <stop offset="1" stop-color="#56705E"/>
    </linearGradient>
  </defs>
  <rect width="500" height="420" fill="url(#dusk)"/>
  <!-- sol poniéndose -->
  <circle cx="368" cy="120" r="46" fill="#E9B44C"/>
  <circle cx="368" cy="120" r="64" fill="#E9B44C" opacity=".18"/>
  <!-- pájaros -->
  <g stroke="#F2E7CF" stroke-width="2.5" fill="none" stroke-linecap="round" opacity=".8">
    <path d="M120 92 q7 -7 14 0 M134 92 q7 -7 14 0"/>
    <path d="M180 120 q5 -5 10 0 M190 120 q5 -5 10 0"/>
  </g>
  <!-- suelo -->
  <path d="M0 320 Q 250 296 500 316 V420 H0 Z" fill="#20362C"/>
