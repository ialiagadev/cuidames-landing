    <circle cx="443" cy="188" r="13" fill="#E9B44C"/>
    <circle cx="443" cy="188" r="24" fill="#E9B44C" opacity=".18"/>
  </g>
  <!-- banco -->
  <g fill="#8A6B45">
    <rect x="180" y="286" width="204" height="12" rx="6"/>
    <rect x="188" y="252" width="188" height="10" rx="5"/>
    <rect x="188" y="236" width="188" height="10" rx="5"/>
    <rect x="192" y="298" width="10" height="52" rx="5"/>
    <rect x="362" y="298" width="10" height="52" rx="5"/>
  </g>
  <!-- abuelo -->
  <g>
    <circle cx="252" cy="204" r="22" fill="#E7C9A9"/>
    <path d="M230 200 a22 22 0 0 1 44 0 l-4 -2 a18 18 0 0 0 -36 0 z" fill="#DDD5C6"/>
    <path d="M232 226 h40 l8 62 h-56 z" fill="#6B5B3E"/>
    <rect x="238" y="286" width="12" height="46" rx="6" fill="#4E5D52"/>
    <rect x="258" y="286" width="12" height="46" rx="6" fill="#4E5D52"/>
    <rect x="236" y="330" width="18" height="9" rx="4.5" fill="#2B2118"/>
    <rect x="256" y="330" width="18" height="9" rx="4.5" fill="#2B2118"/>
