  <g>
    <path d="M96 320 C 92 260 88 220 100 170" stroke="#1A2B21" stroke-width="18" fill="none" stroke-linecap="round"/>
    <circle cx="96" cy="140" r="66" fill="#1F3628"/>
    <circle cx="150" cy="168" r="44" fill="#28422F"/>
    <circle cx="52" cy="176" r="40" fill="#28422F"/>
    <g fill="#E9B44C" opacity=".9"><circle cx="76" cy="128" r="5"/><circle cx="120" cy="152" r="5"/><circle cx="96" cy="178" r="5"/></g>
  </g>
  <!-- farola cálida -->
  <g>
