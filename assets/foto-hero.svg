<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice">
  <!-- Tarde en el parque: los nietos vuelan una cometa -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F7EDD8"/>
      <stop offset=".65" stop-color="#F2DDB4"/>
      <stop offset="1" stop-color="#EDCf9A"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#sky)"/>
  <!-- sol -->
  <circle cx="128" cy="96" r="52" fill="#E9B44C"/>
  <circle cx="128" cy="96" r="70" fill="#E9B44C" opacity=".25"/>
  <!-- nubes -->
  <g fill="#FBF6EA" opacity=".9">
    <ellipse cx="560" cy="70" rx="58" ry="16"/>
    <ellipse cx="602" cy="58" rx="34" ry="12"/>
    <ellipse cx="300" cy="120" rx="44" ry="12"/>
  </g>
  <!-- pájaros -->
  <g stroke="#8A6B45" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M420 96 q8 -8 16 0 M436 96 q8 -8 16 0"/>
    <path d="M480 130 q6 -6 12 0 M492 130 q6 -6 12 0"/>
  </g>
  <!-- cometa -->
  <g>
    <path d="M636 84 L678 118 L636 168 L594 118 Z" fill="#C75B33"/>
    <path d="M636 84 L678 118 L636 118 Z" fill="#A94A28"/>
    <path d="M636 168 C 620 210 600 236 566 268" stroke="#8A6B45" stroke-width="3" fill="none"/>
    <g fill="#E9B44C">
      <path d="M612 196 l10 -6 l-2 12 z"/>
      <path d="M592 226 l10 -6 l-2 12 z"/>
    </g>
  </g>
  <!-- colinas -->
  <path d="M0 330 Q 200 260 430 320 T 800 300 V450 H0 Z" fill="#D3A87E"/>
  <path d="M0 380 Q 260 320 520 372 T 800 356 V450 H0 Z" fill="#C98F63"/>
  <!-- arbolitos -->
  <g>
    <rect x="96" y="304" width="10" height="30" rx="4" fill="#8A6B45"/>
    <circle cx="101" cy="288" r="30" fill="#5E7D62"/>
    <rect x="716" y="296" width="9" height="26" rx="4" fill="#8A6B45"/>
    <circle cx="720" cy="282" r="24" fill="#6E8C6E"/>
  </g>
  <!-- niña con la cometa -->
  <g>
    <circle cx="560" cy="292" r="17" fill="#E7C9A9"/>
    <path d="M543 288 a17 17 0 0 1 34 0 l-4 -2 a13 13 0 0 0 -26 0 z" fill="#5C4632"/>
    <path d="M546 308 h28 l6 44 h-40 z" fill="#C75B33"/>
    <path d="M568 312 L566 270" stroke="#8A6B45" stroke-width="3" stroke-linecap="round"/>
    <rect x="548" y="352" width="9" height="26" rx="4" fill="#E7C9A9"/>
    <rect x="563" y="352" width="9" height="26" rx="4" fill="#E7C9A9"/>
  </g>
  <!-- niño corriendo -->
  <g>
    <circle cx="472" cy="316" r="15" fill="#C98F63"/>
    <path d="M457 312 a15 15 0 0 1 30 0 l-5 -3 a11 11 0 0 0 -21 0 z" fill="#2B2118"/>
    <path d="M460 330 h24 l5 38 h-34 z" fill="#20362C"/>
    <rect x="461" y="368" width="8" height="24" rx="4" fill="#C98F63" transform="rotate(12 465 380)"/>
    <rect x="477" y="368" width="8" height="24" rx="4" fill="#C98F63" transform="rotate(-12 481 380)"/>
  </g>
  <!-- perrito -->
  <g fill="#8A6B45">
    <ellipse cx="392" cy="386" rx="26" ry="14"/>
    <circle cx="416" cy="374" r="10"/>
    <path d="M420 366 l6 -10 l4 10 z"/>
    <path d="M366 384 q-12 -4 -10 -14" stroke="#8A6B45" stroke-width="6" fill="none" stroke-linecap="round"/>
    <rect x="376" y="394" width="6" height="14" rx="3"/>
    <rect x="398" y="394" width="6" height="14" rx="3"/>
  </g>
  <!-- flores -->
  <g fill="#E9B44C">
    <circle cx="130" cy="404" r="5"/><circle cx="180" cy="420" r="4"/><circle cx="256" cy="408" r="5"/>
    <circle cx="640" cy="416" r="5"/><circle cx="700" cy="400" r="4"/>
  </g>
</svg>
